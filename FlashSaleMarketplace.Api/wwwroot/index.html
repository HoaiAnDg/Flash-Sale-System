<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Flash Sale UI - Test End-to-End</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);

            // 1. Tự động gọi API lấy danh mục
            useEffect(() => {
                fetch('/api/catalog/flash-sale-items')
                    .then(res => res.json())
                    .then(response => {
                        if(response.success) {
                            setProducts(response.data);
                        }
                    });
            }, []);

            // 2. Gọi API thêm vào giỏ hàng
            const addToCart = (product) => {
                fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: 1,
                        quantity: 1,
                        variantId: product.variantId, 
                        productName: product.productName, 
                        variantName: product.variantName,
                        flashSalePrice: product.flashSalePrice 
                    })
                })
                .then(res => res.json())
                .then(response => {
                    if(response.success) {
                        setCart([...cart, response.data]);
                        console.log(response.message);
                    }
                });
            };

            // 3. Hàm Chốt đơn (Saga Checkout)
            const checkout = () => {
                fetch('/api/checkout/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: 1 }) // ID 1 là User giả lập đang đăng nhập
                })
                .then(res => res.json())
                .then(response => {
                    if(response.success) {
                        // In kết quả từ SQL Server trả về (Thành công/Hết kho/Hết suất)
                        alert("KẾT QUẢ CHỐT ĐƠN:\n\n" + response.data.join("\n"));
                        // Làm rỗng giỏ hàng trên UI
                        setCart([]);
                    } else {
                        alert("Lỗi: " + response.message);
                    }
                });
            };

            return (
                <div className="max-w-6xl mx-auto grid grid-cols-3 gap-8">
                    {/* Danh mục */}
                    <div className="col-span-2 bg-white p-6 rounded-lg shadow-md">
                        <h2 className="text-2xl font-bold mb-4">🛒 Danh mục Sản phẩm (SQL Server)</h2>
                        <div className="grid grid-cols-2 gap-4">
                            {products.map(p => (
                                <div key={p.variantId} className="border p-4 rounded flex justify-between items-center hover:shadow-lg transition">
                                    <div>
                                        <h3 className="font-bold text-lg">{p.productName}</h3>
                                        <p className="text-gray-500 text-sm mb-2">Phân loại: {p.variantName}</p>
                                        <p className="text-red-600 font-bold text-xl">
                                            {p.flashSalePrice.toLocaleString('vi-VN')} đ
                                        </p>
                                    </div>
                                    <button onClick={() => addToCart(p)} 
                                            className="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 font-bold">
                                        Thêm
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Giỏ hàng */}
                    <div className="bg-white p-6 rounded-lg shadow-md h-fit">
                        <h2 className="text-2xl font-bold mb-4">⚡ Giỏ hàng (MongoDB)</h2>
                        {cart.length === 0 ? (
                            <p className="text-gray-500 italic">Giỏ hàng đang trống.</p>
                        ) : (
                            <div>
                                <ul className="mb-4">
                                    {cart.map((item, idx) => (
                                        <li key={idx} className="border-b py-3 flex flex-col">
                                            <span className="font-semibold">{item.productName}</span>
                                            <span className="text-sm text-gray-500">{item.variantName}</span>
                                        </li>
                                    ))}
                                </ul>
                                <button onClick={checkout} className="w-full bg-green-600 text-white px-4 py-3 rounded hover:bg-green-700 font-bold text-lg shadow-lg">
                                    Chốt Đơn (Saga Checkout)
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
