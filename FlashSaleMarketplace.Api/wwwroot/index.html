<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Flash Sale UI - Test End-to-End</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [cart, setCart] = useState([]);

            // TODO: Sẽ gọi API MongoDB của Ân bằng fetch()
            const addToCart = (product) => {
                setCart([...cart, product]);
                alert(`Đã đẩy lệnh thêm ${product.name} vào giỏ hàng MongoDB!`);
            };

            // TODO: Sẽ gọi API SQL Server của Bảo bằng fetch()
            const checkout = () => {
                alert("Đã đẩy lệnh Checkout vào luồng Saga!");
                setCart([]);
            };

            return (
                <div className="max-w-6xl mx-auto grid grid-cols-3 gap-8">
                    {/* Phần Danh mục Sản phẩm */}
                    <div className="col-span-2 bg-white p-6 rounded-lg shadow-md">
                        <h2 className="text-2xl font-bold mb-4">🛒 Danh mục Sản phẩm (SQL Server)</h2>
                        <div className="grid grid-cols-2 gap-4">
                            {[1, 2, 3].map(id => (
                                <div key={id} className="border p-4 rounded flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold">Sản phẩm Flash Sale {id}</h3>
                                        <p className="text-red-500 font-semibold">99.000đ</p>
                                    </div>
                                    <button onClick={() => addToCart({ id, name: `Sản phẩm ${id}`, price: 99000 })} 
                                            className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                                        Thêm
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Phần Giỏ hàng siêu tốc */}
                    <div className="bg-white p-6 rounded-lg shadow-md h-fit">
                        <h2 className="text-2xl font-bold mb-4">⚡ Giỏ hàng (MongoDB)</h2>
                        {cart.length === 0 ? (
                            <p className="text-gray-500">Giỏ hàng trống.</p>
                        ) : (
                            <div>
                                <ul className="mb-4">
                                    {cart.map((item, idx) => (
                                        <li key={idx} className="border-b py-2 flex justify-between">
                                            <span>{item.name}</span>
                                        </li>
                                    ))}
                                </ul>
                                <button onClick={checkout} className="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 font-bold">
                                    Chốt Đơn (Saga Checkout)
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
